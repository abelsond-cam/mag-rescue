[workspace]
name = "mag-rescue"
version = "0.1.0"
description = "ARIBA-driven virulence/AMR profiling on Klebsiella short-read genomes"
authors = ["David Abelson <dca36@cam.ac.uk>"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
test = "pytest tests/"
lint = "ruff check src/ tests/ && ruff format --check src/ tests/"
fmt = "ruff format src/ tests/"

# Cross-platform Python deps — present in every env so local osx-arm64 dev can
# edit/lint/test even though the ariba-runtime + kleborate-refbuild stacks are
# linux-only.
[dependencies]
python = "3.12.*"
pandas = ">=2.2"
numpy = ">=1.26"
biopython = ">=1.83"
tqdm = ">=4.66"
requests = ">=2.31"

[pypi-dependencies]
mag-rescue = { path = ".", editable = true }

# Disable pip build isolation for ariba/pymummer so the conda-installed
# mummer binaries are visible on PATH during pymummer's setup.py probe.
[pypi-options]
no-build-isolation = ["pymummer", "ariba"]

# -------- runtime feature (default + dev): the ariba stack ----------------
# Linux-only because ariba doesn't build on osx-arm64 (x86 SSE intrinsics in
# its bundled C). On macOS this feature contributes nothing — the env stays
# Python-only.
[feature.runtime.target.linux-64.dependencies]
bowtie2 = "*"
# samtools < 1.10: ariba uses `samtools mpileup -t INFO/AD,INFO/ADF,INFO/ADR`
# which was removed in samtools 1.10. Newer samtools error with
# "mpileup: invalid option -- 't'" and ariba's per-cluster workers die with
# "Signal 15 received in cluster ...".
samtools = "<1.10"
mummer = "*"
cd-hit = "*"
spades = "*"
sra-tools = "*"
# ariba's __init__.py does `from pkg_resources import get_distribution`,
# so it needs setuptools at runtime. Pinned <80: setuptools 80 removed the
# long-deprecated `pkg_resources` module that ariba still imports.
setuptools = "<80"

[feature.runtime.target.linux-64.pypi-dependencies]
ariba = "*"

# -------- dev feature: test + lint tooling --------------------------------
[feature.dev.dependencies]
pytest = "*"
pytest-cov = "*"
ruff = "*"
pre-commit = "*"

# -------- refbuild feature: kleborate for the one-off ref-DB vendoring ----
# kleborate's transitive deps (ectyper -> samtools >=1.8) pull a newer samtools
# than ariba can tolerate, so we keep this in its own env. Only used by
# pp/build_ariba_ref.py; runtime doesn't need it.
[feature.refbuild.target.linux-64.dependencies]
kleborate = ">=3.2"

[environments]
default = { features = ["runtime"], solve-group = "runtime" }
dev = { features = ["runtime", "dev"], solve-group = "runtime" }
refbuild = { features = ["refbuild"] }
